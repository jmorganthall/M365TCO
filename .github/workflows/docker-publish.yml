name: Publish container image

# Builds the multi-stage image (React UI + FastAPI) and publishes it to GitHub
# Container Registry so docker-compose.yml can pull ghcr.io/<owner>/m365tco:latest.
#
# `:latest` tracks `main` (the active development trunk) OR the repository's
# DEFAULT branch — whichever is pushed (see the metadata step). `main` is both
# the trunk and the default branch; the default-branch check is kept so `:latest`
# also stays correct if the default is ever changed.
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name, so M365TCO -> m365tco.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == github.event.repository.default_branch }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Bake build provenance so the running container can offer an
          # "update available" notice. version is set only for v* tag builds.
          build-args: |
            TCO_BUILD_SHA=${{ github.sha }}
            TCO_BUILD_REF=${{ github.ref_name }}
            TCO_BUILD_VERSION=${{ steps.meta.outputs.version }}
